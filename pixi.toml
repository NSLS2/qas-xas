[workspace]
authors = ["Kari Barry <>"]
channels = ["conda-forge"]
name = "qas-lightshow"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test = { cmd = "python test.py", env = { TEST = "1" } }

[pypi-dependencies]
xas = { path = ".", editable = true }

[dependencies]
python = ">=3.12,<3.14"
tiled-client = ">=0.2.8,<0.3"
databroker = ">=2.0.0b8,<3"
tiled-server = ">=0.2.8,<0.3"
xraydb = ">=4.5.8,<5"
lmfit = ">=1.3.4,<2"
matplotlib = ">=3.10.8,<4"
opencv = ">=4.12.0,<5"
scikit-learn = ">=1.8.0,<2"
pyqt = ">=5.15.11,<6"
xraylarch-base = "==0.9.80"
versioneer = "==0.29"
